factor_pool:
  total_factors_before: 166
  total_factors_after: 20
  total_rows: 4387
  primary_label: label_5d
  factor_names:
  - CNTD60
  - CNTN60
  - CNTP30
  - CORR20
  - HIGH0
  - KLEN
  - KLOW
  - KUP2
  - MAX10
  - MIN60
