# Alpha158 因子池 Pipeline 配置
# 用法: uv run python scripts/run_pipeline.py --config configs/alpha_factor.yaml

pipeline:
  name: alpha_factor
  stages:
    - ingest_bin
    - factor_compute
    - label_compute
    - filter
    - export
    - report

data:
  qlib_csv: data/qlib_output/ohlcv
  qlib_bin: data/qlib_bin
  instruments: "csi1000"
  start_date: "2025-01-01"
  end_date: null
  extra_fields:
    - pe_ttm
    - pb_mrq
    - ps_ttm
    - pcf_ttm_oper
    - tot_mv
    - a_mv
    - turnrate

labels:
  primary: "label_5d"
  periods: [1, 5, 10, 20]

filter:
  drop_leakage:
    prefixes: ["LABEL"]
  drop_missing_label: {}
  drop_high_missing:
    threshold: 0.3
  drop_high_inf:
    threshold: 0.01
  drop_low_variance:
    variance_threshold: 1.0e-8
    unique_ratio_threshold: 0.01
  factor_quality:
    mode: "relaxed"
    min_abs_ic_mean: 0.005
    min_abs_icir: 0.1
    min_abs_monotonicity: 0.05
    max_sign_flip_ratio: 0.45
  deduplicate:
    corr_threshold: 0.8
    corr_method: "spearman"
    keep_by: "ic_mean"

output:
  parquet: data/factor_pool.parquet
  yaml: configs/factor_pool.yaml
  report: data/quality/factor_report.md
