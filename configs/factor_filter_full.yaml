# 因子过滤 Pipeline - 使用完整历史数据筛选高质量因子池
# 用法: uv run python scripts/run_pipeline.py --config configs/factor_filter_full.yaml

pipeline:
  name: factor_filter
  stages:
    - merge_gm_data
    - ingest_bin
    - factor_compute
    - data_quality_check
    - label_compute
    - filter
    - export
    - report

data:
  exports_base: data/exports          # GM 下载数据根目录
  qlib_bin: data/qlib_bin_full
  instruments: "csi1000"
  start_date: "2020-01-01"
  end_date: null
  # GM 原生数据目录
  history_dir: data/exports/history_1d
  valuation_dir: data/exports/valuation
  mktvalue_dir: data/exports/mktvalue
  adj_factor_dir: data/exports/adj_factor

labels:
  primary: "label_5d"
  periods: [1, 5, 10, 20]

# 数据质量检查：财务数据向后填充
data_quality:
  max_fill_days: 90  # 最大填充天数，防止使用过老数据

# Relaxed 模式：放宽阈值，保留更多因子
filter:
  drop_missing_label: {}
  drop_high_missing:
    threshold: 0.5
  drop_high_inf:
    threshold: 0.05
  drop_low_variance:
    variance_threshold: 1.0e-10
    unique_ratio_threshold: 0.005
  factor_quality:
    min_abs_ic_mean: 0.002
    min_abs_icir: 0.05
    min_abs_monotonicity: 0.02
    max_sign_flip_ratio: 0.55

output:
  parquet: data/factor_pool_full.parquet
  yaml: configs/factor_pool_full.yaml
  report: data/quality/factor_report_full.md
