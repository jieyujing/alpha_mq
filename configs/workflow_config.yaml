# configs/workflow_config.yaml
# 中证1000多因子选股系统 - qlib 工作流配置

qlib_init:
  provider_uri: ~/.qlib/qlib_data/csi1000
  region: cn

market: &market csi1000
benchmark: &benchmark SH000852

# 数据配置
data_handler_config: &data_handler_config
  start_time: 2020-01-01
  end_time: 2024-12-31
  fit_start_time: 2020-01-01
  fit_end_time: 2022-12-31
  instruments: *market

# 回测配置
port_analysis_config: &port_analysis_config
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy.signal_strategy
    kwargs:
      topk: 50
      n_drop: 5
  executor:
    class: SimulatorExecutor
    module_path: qlib.contrib.executor.simulator_executor
    kwargs:
      time_per_step: day
      generate_portfolio_metrics: true
  backtest:
    start_time: 2023-07-01
    end_time: 2024-12-31
    account: 1000000
    benchmark: *benchmark
    exchange_kwargs:
      freq: day
      open_cost: 0.0015
      close_cost: 0.0025
      min_cost: 5.0
      limit_threshold: 0.095

# 任务配置
task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      learning_rate: 0.05
      n_estimators: 1000
      num_leaves: 31
      colsample_bytree: 0.8
      subsample: 0.8
      early_stopping_rounds: 50

  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs: *data_handler_config
      segments:
        train: [2020-01-01, 2022-12-31]
        valid: [2023-01-01, 2023-06-30]
        test: [2023-07-01, 2024-12-31]

  record:
    - class: SignalRecord
      module_path: qlib.workflow.record_temp
    - class: SigAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        ana_long_short: false
    - class: PortAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        config: *port_analysis_config