# CSI 1000 数据管道配置
# 用法: uv run python scripts/run_pipeline.py --config configs/csi1000_qlib.yaml

pipeline:
  name: csi1000_qlib
  stages:
    - download                    # 从 GM API 增量下载数据 (需 GM token)
    - validate                    # 验证数据完整性
    - clean                       # 数据清理 (CSV 格式无需额外转换)
    - ingest                      # 合并所有数据为 Parquet 宽表

# 下载配置
token: null                       # GM token (建议从环境变量 GM_TOKEN 获取)
index_code: "SHSE.000852"         # 指数代码
start_date: "2020-01-01"          # 数据起始日期
end_date: null                    # 数据结束日期 (null = today)

# 数据目录配置
exports_base: data/exports        # GM 下载数据存放目录 (history_1d, fundamentals_*, valuation 等)
parquet_output: data/parquet      # Parquet 合并输出目录 (daily/, fundamentals/)
