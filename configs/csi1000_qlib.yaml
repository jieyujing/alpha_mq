# CSI 1000 Qlib 数据管道配置
# 用法: uv run python scripts/run_pipeline.py --config configs/csi1000_qlib.yaml

pipeline:
  name: csi1000_qlib
  stages:
    - validate
    - clean
    - ingest

# 数据目录配置
exports_base: data/exports      # GM 下载数据存放目录
qlib_output: data/qlib_output   # Qlib CSV 中间输出目录
qlib_bin: data/qlib_bin         # Qlib 二进制数据最终目录