[project]
name = "alpha-mq"
version = "0.1.0"
description = "中证1000多因子选股系统"
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
    "pyqlib",
    "lightgbm",
    "polars",
    "pandas",
    "numpy",
    "scipy",
    "scikit-learn",
    "joblib",
    "protobuf<=3.20.3",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
]


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["data", "factor", "model", "backtest"]

[dependency-groups]
dev = [
    "pytest-mock>=3.15.1",
]
